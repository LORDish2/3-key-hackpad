    <circle cx="38" cy="38" r="15" fill="#f7fafc" stroke="#1f2937" stroke-width="4"/>
    <circle cx="262" cy="38" r="15" fill="#f7fafc" stroke="#1f2937" stroke-width="4"/>
    <circle cx="38" cy="322" r="15" fill="#f7fafc" stroke="#1f2937" stroke-width="4"/>
